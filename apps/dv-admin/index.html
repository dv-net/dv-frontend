<!doctype html>
<html lang="en">
	<head>
		<style>
			#globalLoader {
				position: fixed;
				inset: 0;
				background: #fff;
				pointer-events: none;
				z-index: calc(9e999);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding-inline: 5vw;
				padding-block: 3dvh;
				transition: opacity 0.5s ease;
				box-sizing: border-box;
			}

			#globalLoader svg {
				width: clamp(270px, 35dvw, 600px) !important;
				height: auto !important;
			}

			#globalLoader:has(~ #app:not(:empty)) {
				opacity: 0;
			}
		</style>

		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>DV Net</title>

		<link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%/static/favicon-180.png" />
		<link rel="manifest" href="%BASE_URL%/static/site.webmanifest" />
		<link rel="icon" type="image/svg+xml" href="%BASE_URL%/static/favicon.svg" />
		<link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%/static/favicon-192.png" />
		<link rel="icon" type="image/png" sizes="512x512" href="%BASE_URL%/static/favicon-512.png" />
	</head>
	<body>
		<div id="globalLoader"></div>

		<div id="app"></div>

		<script async defer>
			(async () => {
				const globalLoader = document.querySelector("#globalLoader");

				if (!globalLoader) return;

				const cache = await caches?.open("__CACHES_NAME__");

				if (!cache) {
					return globalLoader.remove();
				}

				const libSrc = `%BASE_URL%/static/js/lottie.min.js`;
				const loaderSrc = `%BASE_URL%/static/mainLoader.json`;
				let lottieAnimation;

				globalLoader.addEventListener("transitionend", () => {
					lottieAnimation?.stop();

					globalLoader.remove();
				});

				let response = await cache.match(libSrc);
				let responseLoader = await cache.match(loaderSrc);

				if (!response) {
					response = await fetch(libSrc);
					await cache.put(libSrc, response.clone());
				}

				if (!responseLoader) {
					responseLoader = await fetch(loaderSrc);
					await cache.put(loaderSrc, responseLoader.clone());
				}

				const code = await response.text();
				const loaderJson = await responseLoader.json();

				new Function(code)();

				lottieAnimation = lottie.loadAnimation({
					container: globalLoader,
					renderer: "svg",
					loop: true,
					autoplay: true,
					animationData: loaderJson,
					rendererSettings: {
						progressiveLoad: true,
						useCPU: false
					}
				});
			})();
		</script>

		<script defer type="module" src="/src/main.ts"></script>
	</body>
</html>
